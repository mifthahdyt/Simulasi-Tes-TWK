<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJOK EXAM V2 - SMAN 10 SINJAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --card-bg: rgba(255, 255, 255, 0.02);
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --correct: #00ff64;
            --wrong: #ff3232;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; overflow-x: hidden; }
        
        /* Background Decor */
        body::before { content: ""; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%; background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%); z-index: -1; }

        .container { width: 100%; max-width: 600px; position: relative; }

        .card { background: var(--card-bg); backdrop-filter: blur(20px); padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.6); display: none; }
        .card.active { display: block; animation: slideIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .header-ui { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .timer-tag { background: var(--accent); color: #000; padding: 6px 16px; border-radius: 10px; font-weight: 800; font-size: 0.85rem; }
        
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        h2 { font-size: 1.15rem; line-height: 1.6; margin-bottom: 25px; font-weight: 500; text-align: left; letter-spacing: -0.2px; }
        .badge { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-dim); margin-bottom: 8px; display: block; font-weight: 600; }

        .opt-list { display: grid; gap: 12px; }
        .opt { padding: 18px 22px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; cursor: pointer; transition: 0.3s; font-size: 14px; text-align: left; line-height: 1.4; }
        .opt:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
        .opt.selected { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        /* Interactive Feedback */
        .opt.is-correct { background: rgba(0, 255, 100, 0.12) !important; border-color: var(--correct) !important; color: var(--correct); font-weight: 600; }
        .opt.is-wrong { background: rgba(255, 50, 50, 0.12) !important; border-color: var(--wrong) !important; color: var(--wrong); font-weight: 600; }

        input { width: 100%; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }

        .btn { background: var(--accent); color: #000; padding: 20px; border: none; border-radius: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; width: 100%; margin-top: 25px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,255,255,0.1); }
        .btn:active { transform: translateY(-1px); }

        .feedback-area { margin-top: 20px; padding: 20px; border-radius: 16px; font-size: 13px; display: none; line-height: 1.6; border: 1px solid var(--border); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #result-list { text-align: left; margin-top: 25px; max-height: 300px; overflow-y: auto; padding-right: 10px; }
        #result-list::-webkit-scrollbar { width: 4px; }
        #result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .res-item { padding: 15px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-start" class="card active" style="text-align: center;">
        <span class="badge">SMAN 10 SINJAI</span>
        <h1 style="font-size: 2.8rem; letter-spacing: -2px; margin: 10px 0;">PJOK V2</h1>
        <p style="color: var(--text-dim); margin-bottom: 40px; font-size: 0.9rem;">Tahun Pelajaran 2025/2026 • Kelas XII</p>
        <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-bottom: 30px; font-size: 0.85rem; border: 1px solid var(--border);">
            45 Soal • Pilihan Ganda & Isian • Evaluasi Real-time
        </div>
        <button class="btn" onclick="startQuiz()">Mulai Ujian</button>
    </div>

    <div id="screen-quiz" class="card">
        <div class="header-ui">
            <span id="q-counter" class="badge">Question 1/45</span>
            <div id="timer" class="timer-tag">00:00</div>
        </div>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        
        <div id="question-box"></div>
        <div id="feedback" class="feedback-area"></div>
        
        <button id="action-btn" class="btn" onclick="handleFlow()">Cek Jawaban</button>
    </div>

    <div id="screen-result" class="card" style="text-align: center;">
        <span class="badge">Ujian Selesai</span>
        <h1 style="font-size: 1.2rem; color: var(--text-dim);">Skor Akhir Anda</h1>
        <div id="final-score" style="font-size: 6rem; font-weight: 800; margin: -10px 0;">0</div>
        <p id="time-summary" style="margin-bottom: 30px; font-weight: 600;"></p>
        
        <div id="result-list"></div>
        
        <button class="btn" onclick="location.reload()">Ulangi Ujian</button>
    </div>
</div>

<script>
// DATA SOAL V2 (45 NOMOR LENGKAP)
const questions = [
    { type:'pg', q:"Taktik penyerangan efektif membongkar pertahanan area (zone marking) yang rapat adalah...", opts:["Long ball", "Offside trap", "Wall pass (kombinasi passing pendek)", "Man to man"], ans:2, exp:"Wall pass dan pergerakan tanpa bola menciptakan celah di pertahanan rapat." },
    { type:'pg', q:"Teknik 'Pick and Roll' dalam bola basket digunakan untuk...", opts:["Mencuri bola", "Menciptakan ruang tembak via screen", "Melakukan dunks", "Rebound"], ans:1, exp:"Memanfaatkan screen teman untuk menghambat penjaga lawan." },
    { type:'pg', q:"Sistem pertahanan voli 2-1-3 digunakan untuk mengantisipasi...", opts:["Smash keras posisi 4 & 2", "Tipuan net", "Service ace", "Back attack"], ans:0, exp:"Menutup serangan sayap dan depan net penyerang utama." },
    { type:'pg', q:"Strategi bulu tangkis memukul kok menyilang ke depan net lawan disebut...", opts:["Smash silang", "Lob", "Drive", "Cross-court dropshot"], ans:3, exp:"Memaksa lawan bergerak cepat ke depan net sisi silang." },
    { type:'pg', q:"Tujuan utama 'Sacrifice Bunt' pada sofbol adalah...", opts:["Home run", "Mencetak poin langsung", "Membantu pelari maju ke base berikutnya", "Menipu wasit"], ans:2, exp:"Batter sengaja mati (out) agar pelari bisa aman maju base." },
    { type:'pg', q:"Teknik bela-serang pencak silat setelah menangkis tendangan adalah...", opts:["Kuda-kuda", "Tangkisan luar & tendangan sabit", "Hindaran", "Langkah zig-zag"], ans:1, exp:"Kombinasi tangkisan dan serangan balik instan." },
    { type:'pg', q:"Mengapa fase pendinginan (cooling down) sangat penting?", opts:["Agar cepat haus", "Membakar lemak", "Mengembalikan denyut jantung ke normal", "Meningkatkan emosi"], ans:2, exp:"Menurunkan intensitas secara bertahap agar sirkulasi stabil." },
    { type:'pg', q:"Guling lenting gagal (jatuh duduk) biasanya disebabkan oleh...", opts:["Lentingan kurang & tumpuan tangan telat", "Kaki terlalu lurus", "Mata terbuka", "Matras licin"], ans:0, exp:"Tolakan kaki dan pelepasan tangan harus sinkron." },
    { type:'pg', q:"Pengambilan napas renang gaya dada dilakukan saat...", opts:["Meluncur", "Tangan menekan air & dagu angkat", "Tangan lurus depan", "Kaki menendang"], ans:1, exp:"Saat tangan mendorong air, kepala terangkat untuk hirup udara." },
    { type:'pg', q:"Zona latihan (training zone) daya tahan jantung-paru adalah...", opts:["30-40% MHR", "60-85% MHR", "90-100% MHR", "10-20% MHR"], ans:1, exp:"Rentang 60-85% efektif melatih cardiorespiratory." },
    { type:'pg', q:"Posisi pemain krusial memulai distribusi bola serangan balik cepat (4-3-3)?", opts:["Midfielder Playmaker", "Kiper", "Fullback", "Striker"], ans:0, exp:"Playmaker mengatur tempo dan arah bola ke depan." },
    { type:'pg', q:"Pertahanan basket di mana pemain menjaga satu area tertentu disebut...", opts:["Man to man", "Full press", "Zone defense", "Double team"], ans:2, exp:"Pemain fokus pada tanggung jawab wilayah, bukan orang." },
    { type:'pg', q:"Sistem voli: 5 pemain spiker dan 1 pemain setter (bergantian)?", opts:["4Sm-2Su", "5Sm-1Su", "2Sm-4Su", "Libero System"], ans:1, exp:"5 Smasher dan 1 Setter sesuai rotasi." },
    { type:'pg', q:"Pukulan bulu tangkis menukik tajam dengan kekuatan penuh?", opts:["Netting", "Drive", "Lob", "Smash"], ans:3, exp:"Smash adalah serangan utama yang mematikan." },
    { type:'pg', q:"Tujuan strategi 'Sacrifice Bunt' sofbol?", opts:["Batter selamat", "Membuat lawan kaget", "Memajukan pelari ke base berikutnya", "Menghitung poin"], ans:2, exp:"Mengorbankan batter demi kemajuan pelari." },
    { type:'pg', q:"Taktik serangan balik silat menjatuhkan lawan via kaitan kaki?", opts:["Guntingan", "Pukulan", "Tangkisan", "Sabetan"], ans:0, exp:"Guntingan efektif untuk serangan jatuhan." },
    { type:'pg', q:"Urutan sistematika latihan gerak berirama yang benar?", opts:["Inti-Pemanasan-Pendinginan", "Pemanasan-Inti-Pendinginan", "Pendinginan-Inti-Pemanasan", "Acak"], ans:1, exp:"Urutan baku: Pemanasan, Inti, lalu Pendinginan." },
    { type:'pg', q:"Tumpuan utama berat badan saat handstand?", opts:["Dahi", "Punggung", "Kedua telapak tangan", "Siku"], ans:2, exp:"Kedua tangan menopang seluruh beban tubuh." },
    { type:'pg', q:"Bedanya napas gaya bebas dan gaya dada?", opts:["Bebas menoleh samping, Dada angkat depan", "Bebas depan, Dada samping", "Sama saja", "Semua salah"], ans:0, exp:"Teknik menoleh vs teknik angkat kepala." },
    { type:'pg', q:"Usia 18 thn, target HR intensitas 70% (220-Usia)?", opts:["120 bpm", "130 bpm", "141 bpm", "160 bpm"], ans:2, exp:"(220-18) * 0.7 = 141,4 (sekitar 141 bpm)." },
    
    // PG KOMPLEKS (21-23)
    { type:'complex', q:"Prinsip dasar pertahanan sepak bola? (Pilih >1)", opts:["Menutup ruang gerak", "Biarkan kiper sendiri", "Komunikasi lini belakang", "Pressing pembawa bola"], ans:[0, 2, 3], exp:"Menutup ruang, komunikasi, dan pressing adalah kunci." },
    { type:'complex', q:"Komponen kebugaran dominan pemain basket? (Pilih >1)", opts:["Daya ledak tungkai", "Kelenturan leher", "Kelincahan (Agility)", "Ketahanan statis"], ans:[0, 2], exp:"Lompatan (power) dan gerak lincah (agility) sangat utama." },
    { type:'complex', q:"Tahapan RJP sesuai POS yang benar? (Pilih >1)", opts:["Pastikan Aman (Danger)", "Cek respon (Response)", "Langsung beri minum", "Panggil bantuan (Call Help)"], ans:[0, 1, 3], exp:"Safety, Response, lalu Call Help." },

    // MENJODOHKAN (31-40) - Diolah sebagai PG untuk kestabilan web
    { type:'pg', q:"[Jodohkan] Strategi pertahanan satu lawan satu di basket?", opts:["Zone defense", "Full court", "Man to man defense", "Switching"], ans:2, exp:"Man to man berarti satu jaga satu." },
    { type:'pg', q:"[Jodohkan] Pukulan pembuka dalam bulu tangkis?", opts:["Smash", "Dropshot", "Service", "Drive"], ans:2, exp:"Setiap rally dimulai dengan service." },
    { type:'pg', q:"[Jodohkan] Indikator intensitas latihan kebugaran?", opts:["Warna kulit", "Denyut Nadi", "Jumlah keringat", "Lama tidur"], ans:1, exp:"Denyut nadi mencerminkan beban jantung." },
    { type:'pg', q:"[Jodohkan] Gerakan meliuk-liuk pada senam irama menekankan?", opts:["Kekuatan", "Estetika", "Kecepatan", "Berat badan"], ans:1, exp:"Meliuk menonjolkan keindahan/estetika." },
    { type:'pg', q:"[Jodohkan] Sumber energi utama saat berolahraga?", opts:["Protein", "Karbohidrat", "Lemak jenuh", "Air"], ans:1, exp:"Karbohidrat diolah paling cepat jadi energi." },
    { type:'pg', q:"[Jodohkan] Keterampilan dasar kaki renang gaya bebas?", opts:["Frog kick", "Dolphin kick", "Flutter kick", "Scissor kick"], ans:2, exp:"Flutter kick adalah gerakan kaki naik turun." },
    { type:'pg', q:"[Jodohkan] Pelindung tubuh dalam pencak silat?", opts:["Sarung tangan", "Body Protector", "Helmet", "Shin guard"], ans:1, exp:"Body protector melindungi dada/perut." },
    { type:'pg', q:"[Jodohkan] Posisi pemain voli yang khusus bertahan?", opts:["Setter", "Spiker", "Libero", "Server"], ans:2, exp:"Libero tidak boleh menyerang, hanya bertahan." },
    { type:'pg', q:"[Jodohkan] Pukulan keras menukik (Sepak Bola/Umum)?", opts:["Header", "Dribble", "Shooting/Volley", "Throw in"], ans:2, exp:"Shooting/Volley untuk mencetak gol." },

    // ISIAN SINGKAT (41-45)
    { type:'isian', q:"Frekuensi minimal aktivitas fisik sedang dalam seminggu?", ans:"5 kali", exp:"Minimal 5 hari seminggu untuk kesehatan jantung." },
    { type:'isian', q:"Komponen pengisi setengah piring makan (serat & vitamin)?", ans:"sayur dan buah", exp:"Sayur dan buah adalah sumber mikronutrien utama." },
    { type:'isian', q:"Tindakan pertama setelah aman lingkungan saat menemukan orang pingsan?", ans:"cek respon", exp:"Memastikan tingkat kesadaran korban." },
    { type:'isian', q:"Posisi pemain softball yang melempar bola ke pemukul?", ans:"pitcher", exp:"Pitcher bertugas melempar bola ke zona strike." },
    { type:'isian', q:"Istilah bola pukul keluar pagar & kelilingi seluruh base?", ans:"home run", exp:"Home run memberikan poin otomatis." }
];

let currentIndex = 0, score = 0, timeElapsed = 0, timerActive = false, missedQuestions = [];

function startQuiz() {
    document.getElementById('screen-start').classList.remove('active');
    document.getElementById('screen-quiz').classList.add('active');
    timerActive = true;
    setInterval(() => { if(timerActive) { timeElapsed++; updateUI(); } }, 1000);
    renderQuestion();
}

function updateUI() {
    let m = Math.floor(timeElapsed/60).toString().padStart(2,'0');
    let s = (timeElapsed%60).toString().padStart(2,'0');
    document.getElementById('timer').innerText = `${m}:${s}`;
    document.getElementById('q-counter').innerText = `Question ${currentIndex + 1}/${questions.length}`;
    document.getElementById('p-fill').style.width = `${((currentIndex + 1)/questions.length)*100}%`;
}

function renderQuestion() {
    const q = questions[currentIndex], box = document.getElementById('question-box');
    let html = `<h2>${q.q}</h2>`;

    if(q.type === 'pg' || q.type === 'complex') {
        html += `<div class="opt-list">` + q.opts.map((o,i) => `<div class="opt" onclick="handleSelect(${i}, '${q.type}')">${o}</div>`).join('') + `</div>`;
    } else {
        html += `<input type="text" id="user-input" placeholder="Jawaban anda..." autocomplete="off">`;
    }
    box.innerHTML = html;
    document.getElementById('feedback').classList.remove('visible');
    document.getElementById('action-btn').innerText = "Cek Jawaban";
}

function handleSelect(i, type) {
    const opts = document.querySelectorAll('.opt');
    if(type === 'pg') opts.forEach(o => o.classList.remove('selected'));
    opts[i].classList.toggle('selected');
}

function handleFlow() {
    const btn = document.getElementById('action-btn');
    if(btn.innerText === "CEK JAWABAN") {
        processValidation();
        btn.innerText = (currentIndex === questions.length - 1) ? "Lihat Hasil" : "Lanjut Soal";
    } else {
        if(currentIndex < questions.length - 1) {
            currentIndex++;
            renderQuestion();
            updateUI();
        } else {
            showResults();
        }
    }
}

function processValidation() {
    const q = questions[currentIndex], fdb = document.getElementById('feedback'), opts = document.querySelectorAll('.opt');
    let isCorrect = false;

    if(q.type === 'pg') {
        let sel = document.querySelector('.opt.selected');
        if(!sel) return;
        let idx = Array.from(opts).indexOf(sel);
        isCorrect = (idx === q.ans);
        opts[q.ans].classList.add('is-correct');
        if(!isCorrect) sel.classList.add('is-wrong');
    } else if(q.type === 'complex') {
        let sels = Array.from(document.querySelectorAll('.opt.selected')).map(el => Array.from(opts).indexOf(el));
        isCorrect = (JSON.stringify(sels.sort()) === JSON.stringify(q.ans.sort()));
        opts.forEach((o,i) => {
            if(q.ans.includes(i)) o.classList.add('is-correct');
            else if(sels.includes(i)) o.classList.add('is-wrong');
        });
    } else if(q.type === 'isian') {
        isCorrect = document.getElementById('user-input').value.toLowerCase().includes(q.ans);
    }

    if(isCorrect) {
        score += Math.round(100 / questions.length);
        fdb.style.color = "var(--correct)";
        fdb.style.borderColor = "var(--correct)";
    } else {
        missedQuestions.push({q: q.q, ans: q.exp});
        fdb.style.color = "var(--wrong)";
        fdb.style.borderColor = "var(--wrong)";
    }

    fdb.innerHTML = `<strong>${isCorrect ? 'BENAR' : 'SALAH'}</strong><br>${q.exp}`;
    fdb.classList.add('visible');
}

function showResults() {
    timerActive = false;
    document.getElementById('screen-quiz').classList.remove('active');
    document.getElementById('screen-result').classList.add('active');
    document.getElementById('final-score').innerText = score > 100 ? 100 : score;
    document.getElementById('time-summary').innerText = `Durasi: ${document.getElementById('timer').innerText}`;
    
    document.getElementById('result-list').innerHTML = `<h3>Evaluasi Pembelajaran:</h3>` + 
        missedQuestions.map(m => `<div class="res-item"><b>${m.q}</b><br><small style="color:#777">${m.ans}</small></div>`).join('');
}
</script>
</body>
</html>
